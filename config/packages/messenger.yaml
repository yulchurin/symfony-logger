framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: logs.ingest
                        type: direct
                        flags: 2  # AMQP_DURABLE
                        default_publish_routing_key: logs
                    queues:
                        logs.ingest:
                            flags: 2  # AMQP_DURABLE
                            binding_keys: [logs]
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 0

            failed:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: logs.failed
                        type: direct
                        flags: 2  # AMQP_DURABLE
                    queues:
                        logs.failed:
                            flags: 2  # AMQP_DURABLE

        routing:
            'App\Message\LogMessage': async
